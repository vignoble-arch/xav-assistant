<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#172033" />
    <title>Pointeuse Cathy</title>
    <link rel="stylesheet" href="pointeuse.css?v=cathy-1" />
  </head>
  <body>
    <main class="clock-shell">
      <section class="clock-card">
        <p class="kicker">Assistant Xavier</p>
        <h1>Pointeuse Cathy</h1>
        <p class="hint" id="nextActionHint">Chargement de la journee...</p>

        <section class="today-card" aria-label="Pointages du jour">
          <span>Cathy</span>
          <strong id="todayStatus">En attente</strong>
          <p id="todayEntries">Aucun pointage charge.</p>
        </section>

        <label>
          Observation
          <textarea id="observation" rows="4" placeholder="Optionnel : retard, depart exceptionnel, oubli, livraison, imprevu..."></textarea>
        </label>

        <button class="main-punch" type="button" id="punchButton">Pointer maintenant</button>

        <p class="result" id="result">En attente.</p>
        <p class="small-note">Le premier pointage du jour est l'arrivee. Le deuxieme est le depart. La pause de 1h est retiree automatiquement, sauf depart avant 13h.</p>
      </section>
    </main>
    <script src="pointeuse.js?v=cathy-1"></script>
  </body>
</html>
