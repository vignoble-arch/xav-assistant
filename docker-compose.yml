services:
  assistant:
    build: .
    container_name: assistant-xavier
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: "4173"
      DATA_DIR: /app/data
      POSTGRES_HOST: postgres
      POSTGRES_USER: assistant
      POSTGRES_DB: assistant_xavier
      RAG_URL: http://qdrant:6333
    volumes:
      - assistant_data:/app/data
      - ./backups:/app/backups
    ports:
      - "127.0.0.1:4173:4173"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: assistant-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: assistant
      POSTGRES_DB: assistant_xavier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant_xavier"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: assistant-rag
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  n8n:
    image: n8nio/n8n:1.123.4
    container_name: assistant-n8n
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      N8N_HOST: ${APP_DOMAIN:-vps-b6bb35e6.vps.ovh.net}
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: https://${APP_DOMAIN:-vps-b6bb35e6.vps.ovh.net}/n8n/
      WEBHOOK_URL: https://${APP_DOMAIN:-vps-b6bb35e6.vps.ovh.net}/n8n/
      N8N_PORT: "5678"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: "true"
      N8N_PROXY_HOPS: "1"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
      N8N_RUNNERS_ENABLED: "true"
      DB_SQLITE_POOL_SIZE: "5"
      GENERIC_TIMEZONE: Europe/Paris
      TZ: Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n

  caddy:
    image: caddy:2-alpine
    container_name: assistant-https
    restart: unless-stopped
    profiles:
      - public
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - assistant
      - n8n

volumes:
  assistant_data:
  postgres_data:
  qdrant_data:
  n8n_data:
  caddy_data:
  caddy_config:
